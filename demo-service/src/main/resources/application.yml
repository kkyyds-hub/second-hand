server:
  port: 8080

spring:
  mail:
    username: 1194921820@qq.com
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${demo.datasource.driver-class-name}
      url: jdbc:mysql://${demo.datasource.host}:${demo.datasource.port}/${demo.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${demo.datasource.username}
      password: ${demo.datasource.password}

  redis:
    host: ${demo.redis.host}
    port: ${demo.redis.port}
    database: ${demo.redis.database}

  # MongoDB（站内消息等），未安装时先空着，见 application-dev.yml
  data:
    mongodb:
      uri: ${demo.mongodb.uri:}

  # RabbitMQ（Day14 异步消息），见 application-dev.yml
  rabbitmq:
    host: ${demo.rabbitmq.host:}
    port: ${demo.rabbitmq.port:5672}
    username: ${demo.rabbitmq.username:}
    password: ${demo.rabbitmq.password:}
    virtual-host: ${demo.rabbitmq.virtual-host:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: ${demo.rabbitmq.prefetch:20}
        default-requeue-rejected: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.demo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.demo.mapper: info
    com.demo.service: info
    com.demo.controller: info
    org.springframework.web: info

# 应用自定义配置
demo:
  jwt:
    admin-secret-key: ${DEMO_JWT_ADMIN_SECRET:dev-admin-secret-change-me}
    admin-token-name: token
    admin-ttl: 7200000
    user-secret-key: ${DEMO_JWT_USER_SECRET:dev-user-secret-change-me}
    user-token-name: authentication
    user-ttl: 7200000


  # 微信配置（如果需要）
  wechat:
    appid: ${demo.wechat.appid}  # 替换为实际值
    secret: ${demo.wechat.secret}  # 替换为实际值
  redis:
    enabled: false  # 若本地未启动Redis，可改为false以跳过Redis相关Bean创建
  auth:
    email:
      provider: mock
      register-code-required: false
      activation-ttl-hours: 24
      activation-base-url: http://localhost:5173
      mock:
        enabled: true
        store-preview: true
        recent-limit: 20
        log-activation-url: true
  cache:
    enabled: true
    product:
      jitter-percent: 20
      detail:
        enabled: true
        ttl-seconds: 120
        null-ttl-seconds: 20
        lock-seconds: 3
      list:
        enabled: true
        ttl-seconds: 45
        lock-seconds: 3

  # Day14 RabbitMQ（仅配置项；队列/交换机声明与业务骨架后续落地）
  rabbitmq:
    enabled: true
    exchange:
      order-events: order.events.exchange
    routing-key:
      order-created: order.created
      order-paid: order.paid
      order-status-changed: order.status.changed
      order-timeout: order.timeout
      order-timeout-delay: order.timeout.delay
      product-reviewed: product.reviewed
      product-force-off-shelf: product.force.off.shelf
      product-report-resolved: product.report.resolved
      dlq: order.dlq
    queue:
      order-timeout: order.timeout.queue
      inventory-update: inventory.update.queue
      order-fulfillment: order.fulfillment.queue
      order-status-sync: order.status.sync.queue
      product-reviewed-notice: product.reviewed.notice.queue
      product-force-off-shelf-notice: product.force.off.shelf.notice.queue
      product-report-resolved-notice: product.report.resolved.notice.queue
      dlq: order.dlq.queue
      order-timeout-delay: order.timeout.delay.queue

order:
  timeout:
    pending-minutes: 15
    batch-size: 200
    fixed-delay-ms: 60000
  ship-timeout:
    hours: 48
    batch-size: 200
    fixed-delay-ms: 60000
    retry-delay-seconds: 120
    penalty:
      enabled: true
  refund:
    batch-size: 200
    fixed-delay-ms: 60000
    retry-delay-seconds: 120
    accounting:
      enabled: true
  ship-reminder:
    enabled: true
    batch-size: 200
    fixed-delay-ms: 60000
    running-timeout-minutes: 5
  notice:
    paid-notify-seller-enabled: true
    status-changed-enabled: true
    ship-reminder-enabled: true
    ship-timeout-cancel-enabled: true
    refund-success-enabled: true

# Day20 - mock 支付演示配置
# 说明：
# 1) channel 用于对外标识“当前是 mock 支付通道”；
# 2) sign 用于构造演示回调请求，实际仍由回调接口里的占位验签规则校验；
# 3) 该配置不会把系统升级成真实支付，只是把演示入口收口到统一回调主链。
payment:
  mock:
    channel: mock
    sign: day20-mock-sign

# P4-S4 Outbox 发布与监控参数
outbox:
  publish:
    batch-size: 50
    retry-delay-seconds: 30
    exclude-test-exchanges-enabled: true
    exclude-exchanges: bad.exchange
  monitor:
    fail-threshold: 5
    fail-retry-threshold: 10
    exclude-test-exchanges-enabled: true
    exclude-exchanges: bad.exchange

# Day16 商品治理通知开关（支持灰度/故障快速隔离）
product:
  notice:
    reviewed-enabled: true
    force-off-shelf-enabled: true
    report-resolved-enabled: true

logistics:
  provider: mock
  mock:
    enabled: true
    fast-forward: false
    fixed-now:
    fast-forward-minutes: [0, 2, 4, 6]
    normal-minutes: [0, 30, 120, 240]
  sync:
    interval-minutes: 30
  delivery-tracker:
    enabled: false
    base-url: https://api.tracker.delivery
    api-key: ${demo.logistics.delivery-tracker.api-key:}

# Day13 Step8 - 积分配置
points:
  order-complete: 1  # 订单完成买卖双方各获得积分数
