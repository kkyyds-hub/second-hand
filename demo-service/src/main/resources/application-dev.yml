demo:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: secondhand2
    username: root
    password: 1234



  redis:
    host: localhost
    port: 6379
    database: 2
    enabled: true
  cache:
    enabled: true
    product:
      jitter-percent: 20
      detail:
        enabled: true
        ttl-seconds: 120
        null-ttl-seconds: 20
        lock-seconds: 3
      list:
        enabled: true
        ttl-seconds: 45
        lock-seconds: 3

  # MongoDB（站内消息）无认证直连
  mongodb:
    uri: mongodb://localhost:27017/demo

  # Day14 RabbitMQ（开发机默认本地容器/本机服务）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    prefetch: 20

  auth:
    sms:
      provider: mock
      code-ttl-minutes: 5
      rate-limit-seconds: 60
      mock:
        enabled: true
        log-code: true
    email:
      provider: mock
      register-code-required: false
      activation-ttl-hours: 24
      activation-base-url: http://localhost:${server.port}
      mock:
        enabled: true
        store-preview: true
        recent-limit: 20
        log-activation-url: true

  logistics:
    provider: mock
    mock:
      enabled: true
      fast-forward: true
      fixed-now:
      fast-forward-minutes: [0, 2, 4, 6]
      normal-minutes: [0, 30, 120, 240]
    delivery-tracker:
      enabled: false
      api-key:

# Day20 - 开发环境 mock 支付配置
# 这里保留为固定签名即可，方便 Postman / 前端演示页复用。
payment:
  mock:
    channel: mock
    sign: day20-dev-mock-sign

avatar-storage:
  provider: local-file-storage
  upload-config-ttl-seconds: 300
  max-file-size-bytes: 2097152
  public-url-prefix: /uploads
  upload-sign-secret: day20-dev-avatar-sign
  local:
    root-dir: uploads
    avatar-dir: avatars

logging:
  level:
    com.demo.mapper: debug
